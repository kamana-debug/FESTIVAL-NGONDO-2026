<!-- LIGHTBOX -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Visionneuse photo">
  <button class="lightbox-close" id="lightbox-close" aria-label="Fermer">✕</button>
  <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Photo précédente">‹</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Photo suivante">›</button>
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<div id="site-footer"></div>

<script>
// Gallery lightbox
const thumbs = Array.from(document.querySelectorAll('.gallery-thumb'));
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCap = document.getElementById('lightbox-caption');
let cur = 0;

function openLb(idx) {
  cur = idx;
  const th = thumbs.filter(t => t.offsetParent !== null)[cur];
  if (!th) return;
  lbImg.src = th.querySelector('img').src;
  lbImg.alt = th.querySelector('img').alt;
  lbCap.textContent = th.dataset.caption || '';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
function nav(dir) {
  const visible = thumbs.filter(t => t.offsetParent !== null);
  cur = (cur + dir + visible.length) % visible.length;
  lbImg.src = visible[cur].querySelector('img').src;
  lbImg.alt = visible[cur].querySelector('img').alt;
  lbCap.textContent = visible[cur].dataset.caption || '';
}

thumbs.forEach((th, i) => th.addEventListener('click', () => {
  const visible = thumbs.filter(t => t.offsetParent !== null);
  openLb(visible.indexOf(th));
}));
document.getElementById('lightbox-close').onclick = closeLb;
document.getElementById('lightbox-prev').onclick = () => nav(-1);
document.getElementById('lightbox-next').onclick = () => nav(1);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') nav(-1);
  if (e.key === 'ArrowRight') nav(1);
});

// Filtres galerie
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const cat = this.dataset.cat;
    thumbs.forEach(th => {
      th.style.display = (cat === 'all' || th.dataset.cat === cat) ? '' : 'none';
    });
  });
});
</script>
